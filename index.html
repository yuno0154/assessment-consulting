<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>평가계획서 서면 컨설팅 시스템</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<style>
  :root {
    --navy: #1a3d6b;
    --navy-light: #e8f0f8;
    --accent: #c0392b;
    --ok: #1d6a3a;
    --ok-light: #e8f5e9;
    --warn: #7d4a00;
    --warn-light: #fff3e0;
    --req: #a32d2d;
    --req-light: #fdecea;
    --gray: #5f5e5a;
    --gray-light: #f5f5f5;
    --border: #ddd;
    --white: #fff;
    --core-yellow: #fffde7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; font-size: 14px; background: #f0f2f5; color: #222; }

  /* 헤더 */
  .app-header { background: var(--navy); color: white; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
  .app-header h1 { font-size: 15px; font-weight: 600; }
  .app-header .subtitle { font-size: 11px; opacity: 0.7; margin-top: 2px; }


  /* 컨테이너 */
  .container { max-width: 860px; margin: 0 auto; padding: 16px; }

  /* 카드 */
  .card { background: var(--white); border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden; }
  .card-header { background: var(--navy); color: white; padding: 10px 16px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .card-header .step-num { background: rgba(255,255,255,0.2); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .card-body { padding: 16px; }

  /* 폼 요소 */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; color: var(--gray); font-weight: 600; }
  .form-group input, .form-group select, .form-group textarea {
    border: 1px solid var(--border); border-radius: 4px; padding: 7px 10px; font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--navy); }
  .form-group textarea { resize: vertical; min-height: 60px; line-height: 1.5; }

  /* 판정 영역 */
  .item-section { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 12px; overflow: hidden; }
  .item-title { background: var(--gray-light); padding: 8px 14px; font-size: 12px; font-weight: 600; color: var(--navy); display: flex; align-items: center; gap: 6px; border-bottom: 1px solid var(--border); }
  .item-title .core-badge { background: var(--accent); color: white; font-size: 10px; padding: 1px 6px; border-radius: 10px; }
  .item-body { padding: 12px 14px; }

  /* 라디오 버튼 그룹 */
  .radio-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .radio-btn { cursor: pointer; }
  .radio-btn input { display: none; }
  .radio-btn span {
    display: inline-block; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
    font-size: 12px; color: var(--gray); transition: all 0.15s; user-select: none;
  }
  .radio-btn input:checked + span.ok { background: var(--ok-light); color: var(--ok); border-color: var(--ok); font-weight: 600; }
  .radio-btn input:checked + span.warn { background: var(--warn-light); color: var(--warn); border-color: var(--warn); font-weight: 600; }
  .radio-btn input:checked + span.req { background: var(--req-light); color: var(--req); border-color: var(--req); font-weight: 600; }
  .radio-btn:hover span { border-color: var(--navy); }

  /* 체크박스 그룹 */
  .check-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .check-item { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; }
  .check-item input[type=checkbox] { margin-top: 2px; flex-shrink: 0; accent-color: var(--navy); }
  .check-item span { font-size: 12px; color: #444; line-height: 1.5; }

  /* 컨설팅 문장 미리보기 */
  .preview-box {
    background: var(--navy-light); border-left: 3px solid var(--navy);
    border-radius: 0 4px 4px 0; padding: 10px 12px; margin: 8px 0;
    font-size: 12px; line-height: 1.7; color: #333; display: none;
  }
  .preview-box.show { display: block; }
  .preview-box.ok { background: var(--ok-light); border-color: var(--ok); }
  .preview-box.warn { background: var(--warn-light); border-color: var(--warn); }
  .preview-box.req { background: var(--req-light); border-color: var(--req); }

  /* 빈칸 입력 */
  .blank-group { background: #fffde7; border: 1px solid #f9a825; border-radius: 4px; padding: 10px 12px; margin: 6px 0; }
  .blank-group label { font-size: 11px; color: #7d4a00; font-weight: 600; display: block; margin-bottom: 4px; }
  .blank-group input, .blank-group textarea {
    width: 100%; border: 1px solid #f9a825; border-radius: 3px; padding: 5px 8px;
    font-size: 12px; font-family: inherit; background: white; outline: none;
  }
  .blank-group input:focus, .blank-group textarea:focus { border-color: var(--navy); }

  /* 추가의견 */
  .extra-opinion { margin-top: 8px; }
  .extra-opinion label { font-size: 11px; color: var(--gray); display: block; margin-bottom: 4px; }
  .extra-opinion textarea { width: 100%; border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; font-size: 12px; font-family: inherit; resize: vertical; min-height: 50px; outline: none; }
  .extra-opinion textarea:focus { border-color: var(--navy); }

  /* 라이브러리 제안 */
  .proposal-area { margin-top: 6px; }
  .proposal-check { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .proposal-check input { accent-color: var(--accent); }
  .proposal-check span { font-size: 11px; color: var(--accent); }
  .proposal-input { margin-top: 6px; display: none; }
  .proposal-input.show { display: block; }
  .proposal-input textarea { width: 100%; border: 1px solid var(--accent); border-radius: 4px; padding: 6px 8px; font-size: 12px; font-family: inherit; resize: vertical; min-height: 50px; outline: none; background: #fff5f5; }

  /* 입력 모드 선택 */
  .input-mode-selector { display: flex; gap: 12px; margin: 8px 0; }
  .input-mode-selector label { display: flex; align-items: center; gap: 5px; font-size: 12px; cursor: pointer; }
  .input-mode-selector input[type="radio"] { accent-color: var(--navy); }
  .direct-input-area { margin-top: 6px; }
  .direct-input-area textarea { width: 100%; border: 1px solid var(--border); border-radius: 4px; padding: 6px 8px; font-size: 12px; font-family: inherit; resize: vertical; min-height: 60px; outline: none; }
  .direct-input-area textarea:focus { border-color: var(--navy); }
  .direct-input-actions { display: flex; gap: 6px; margin-top: 4px; }
  .direct-input-actions button { padding: 4px 10px; font-size: 11px; border: 1px solid var(--navy); background: var(--navy-light); color: var(--navy); border-radius: 4px; cursor: pointer; font-family: inherit; }
  .direct-input-actions button:hover { background: var(--navy); color: white; }

  /* 문장 선택 모달 */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal-box { background: white; border-radius: 10px; width: 90%; max-width: 600px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
  .modal-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-header h3 { margin: 0; font-size: 15px; color: var(--navy); }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--gray); padding: 0; line-height: 1; }
  .modal-close:hover { color: var(--navy); }
  .modal-body { padding: 14px 18px; overflow-y: auto; flex: 1; }
  .modal-body .library-sentence { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; cursor: pointer; font-size: 12px; line-height: 1.6; transition: all 0.15s; }
  .modal-body .library-sentence:hover { background: var(--navy-light); border-color: var(--navy); }
  .modal-empty { text-align: center; padding: 20px; color: var(--gray); font-size: 12px; }

  /* 수행평가 탭 */
  .perf-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
  .perf-tab {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    font-size: 12px; cursor: pointer; background: white; color: var(--gray);
    transition: all 0.15s; font-family: inherit;
  }
  .perf-tab.active { background: var(--navy); color: white; border-color: var(--navy); }
  .perf-panel { display: none; }
  .perf-panel.active { display: block; }
  .perf-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .perf-name-row label { font-size: 12px; color: var(--gray); font-weight: 600; white-space: nowrap; }
  .perf-name-row input { flex: 1; border: 1px solid var(--border); border-radius: 4px; padding: 6px 10px; font-size: 13px; font-family: inherit; outline: none; }
  .perf-name-row input:focus { border-color: var(--navy); }

  /* 버튼 */
  .btn { padding: 10px 20px; border-radius: 6px; border: none; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 600; transition: all 0.15s; }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: #122d50; }
  .btn-ok { background: var(--ok); color: white; }
  .btn-ok:hover { opacity: 0.9; }
  .btn-secondary { background: white; color: var(--navy); border: 1px solid var(--navy); }
  .btn-secondary:hover { background: var(--navy-light); }
  .btn-danger { background: var(--accent); color: white; }
  .btn-danger:hover { opacity: 0.9; }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }

  /* 고교 표시 */
  .high-only { display: none; }
  .high-school .high-only { display: block; }

  /* 구분선 */
  .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  /* 알림 */
  .notice { background: var(--core-yellow); border: 1px solid #f9a825; border-radius: 4px; padding: 8px 12px; font-size: 12px; color: #7d4a00; margin-bottom: 12px; }

  /* 완료 상태 표시 */
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; display: inline-block; margin-right: 4px; }
  .status-dot.done { background: var(--ok); }
  .status-dot.issue { background: var(--req); }

  /* 반응형 */
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .form-row.three { grid-template-columns: 1fr; }
  }

  /* 인쇄 숨김 */
  @media print { .app-header, .btn-group, .perf-tabs { display: none; } }
</style>
</head>
<body>

<div class="app-header">
  <div>
    <div class="app-header h1" style="font-size:15px;font-weight:600;">2026 평가계획서 서면 컨설팅 시스템</div>
    <div class="subtitle">중등 학생평가 종합 점검단</div>
  </div>

</div>

<div class="container" id="appContainer">

  <!-- 상단 버튼 그룹 -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin:16px 0;">
    <button class="btn btn-secondary" onclick="saveBackup()">💾 임시저장 (.json)</button>
    <button class="btn btn-secondary" onclick="loadBackup()">📂 불러오기</button>
    <button class="btn btn-danger" onclick="newSubject()">🆕 새과목</button>
  </div>

  <!-- STEP 1: 기본 정보 -->
  <div class="card">
    <div class="card-header">
      <div class="step-num">1</div>
      기본 정보 입력
    </div>
    <div class="card-body">
      <div class="form-row three">
        <div class="form-group">
          <label>학교급</label>
          <select id="schoolLevel" onchange="onSchoolLevelChange()">
            <option value="">선택</option>
            <option value="middle">중학교</option>
            <option value="high">고등학교</option>
          </select>
        </div>
        <div class="form-group">
          <label>학교명</label>
          <input type="text" id="schoolName" placeholder="예) ○○중학교" oninput="saveData()">
        </div>
        <div class="form-group">
          <label>과목명</label>
          <input type="text" id="subjectName" placeholder="예) 공통국어1" oninput="saveData()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>수행평가 개수</label>
          <select id="perfCount" onchange="onPerfCountChange()">
            <option value="">선택</option>
            <option value="2">2개</option>
            <option value="3">3개</option>
            <option value="4">4개</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- STEP 2: 과목 단위 항목 -->
  <div class="card" id="subjectItemsCard" style="display:none">
    <div class="card-header">
      <div class="step-num">2</div>
      과목 단위 점검 항목
    </div>
    <div class="card-body">

      <!-- 항목 1 -->
      <div class="item-section">
        <div class="item-title">항목 1 &nbsp;|&nbsp; 교수·학습 계획과 세부 평가계획의 성취기준 일치 여부 확인</div>
        <div class="item-body">
          <div class="radio-group" id="item1-radios">
            <label class="radio-btn"><input type="radio" name="item1" value="적절" onchange="onItem1Change('적절')"><span class="ok">적절</span></label>
            <label class="radio-btn"><input type="radio" name="item1" value="수정 요청" onchange="onItem1Change('수정 요청')"><span class="req">수정 요청</span></label>
          </div>
          <div class="preview-box" id="item1-preview"></div>
          <div class="input-mode-selector">
            <label><input type="radio" name="item1-inputMode" value="library" onchange="onInputModeChange(-1, '1', 'library')"> 라이브러리</label>
            <label><input type="radio" name="item1-inputMode" value="direct" onchange="onInputModeChange(-1, '1', 'direct')"> 직접 입력</label>
          </div>
          <div id="item1-direct-section" style="display:none;">
            <div class="direct-input-area">
              <textarea id="item1-extra" placeholder="직접 입력하거나 아래 버튼으로 라이브러리 문장을 선택하세요." oninput="saveData()"></textarea>
            </div>
            <div class="direct-input-actions">
              <button onclick="openSentenceModal(-1, '1')">📚 문장 선택</button>
            </div>
          </div>
          <div class="proposal-area">
            <label class="proposal-check">
              <input type="checkbox" id="item1-propose" onchange="toggleProposal('item1')">
              <span>📌 라이브러리에 추가 제안</span>
            </label>
            <div class="proposal-input" id="item1-proposal-input">
              <textarea placeholder="제안할 표준 문장을 입력하세요." id="item1-proposal-text" oninput="saveData()"></textarea>
            </div>
          </div>
        </div>
      </div>

      <!-- 항목 1-1 (고교만) -->
      <div class="item-section high-only" id="item1_1-section">
        <div class="item-title">항목 1-1 &nbsp;|&nbsp; 학기 전체 성취기준의 평가계획 반영 여부 확인 <span style="font-size:10px;color:var(--gray);font-weight:400;">(고등학교)</span></div>
        <div class="item-body">
          <div class="form-group" style="margin-bottom:10px;">
            <label>누락된 성취기준 코드 입력 (없으면 비워두세요)</label>
            <input type="text" id="item1_1-codes" placeholder="예) [12국01-03], [12국01-05]" oninput="onItem1_1Change()">
          </div>
          <div class="preview-box" id="item1_1-preview"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- STEP 3: 수행평가별 항목 -->
  <div class="card" id="perfItemsCard" style="display:none">
    <div class="card-header">
      <div class="step-num">3</div>
      수행평가별 점검 항목
    </div>
    <div class="card-body">
      <div class="perf-tabs" id="perfTabs"></div>
      <div id="perfPanels"></div>
    </div>
  </div>

  <!-- STEP 4: 출력 -->
  <div class="card" id="outputCard" style="display:none">
    <div class="card-header">
      <div class="step-num">4</div>
      컨설팅 의견 생성 및 출력
    </div>
    <div class="card-body">
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateOutput()">컨설팅 의견 생성</button>
        <button class="btn btn-ok" onclick="downloadDocx()">워드 다운로드 (.docx)</button>
        <button class="btn btn-secondary" onclick="downloadTxt()">텍스트 다운로드 (.txt)</button>
        <button class="btn btn-secondary" onclick="copyToClipboard()">클립보드 복사</button>
      </div>
      <div id="outputPreview" style="display:none;margin-top:16px;">
        <div style="background:#f9f9f9;border:1px solid var(--border);border-radius:6px;padding:16px;font-size:12px;line-height:1.9;white-space:pre-wrap;max-height:500px;overflow-y:auto;" id="outputText"></div>
      </div>
    </div>
  </div>

  <!-- STEP 5: 라이브러리 제안 제출 -->
  <div class="card" id="proposalCard" style="display:none">
    <div class="card-header">
      <div class="step-num">5</div>
      라이브러리 추가 제안 제출
    </div>
    <div class="card-body">
      <div class="notice">📌 체크하신 라이브러리 추가 제안을 관리자에게 전송합니다. GitHub 연결 정보를 입력해 주세요.</div>
      <div class="form-row">
        <div class="form-group">
          <label>GitHub 사용자명 (관리자 계정)</label>
          <input type="text" id="proposalGithubUser" placeholder="예) yuno0154" oninput="saveProposalConfig()">
        </div>
        <div class="form-group">
          <label>Repository 이름</label>
          <input type="text" id="proposalGithubRepo" placeholder="예) assessment-consulting" oninput="saveProposalConfig()">
        </div>
      </div>
      <div class="form-group">
        <label>GitHub Token <span style="font-size:10px;color:var(--gray);font-weight:400;">(관리자가 공유한 토큰 또는 본인 토큰)</span></label>
        <input type="password" id="proposalGithubToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" oninput="saveProposalConfig()">
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="submitProposals()">제안 전송 ↗</button>
      </div>
      <div id="proposalStatus" style="display:none;margin-top:10px;padding:8px 12px;border-radius:4px;font-size:12px;"></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ───────────────────────────────────────────
// 라이브러리 로딩
// ───────────────────────────────────────────
let LIBRARY = null;

async function loadLibrary() {
  try {
    const res = await fetch('library.json');
    if (!res.ok) throw new Error('library.json not found');
    LIBRARY = await res.json();
  } catch(e) {
    LIBRARY = getFallbackLibrary();
  }
}

// ───────────────────────────────────────────
// 상태 관리
// ───────────────────────────────────────────
let state = {
  schoolLevel: '',
  schoolName: '',
  subjectName: '',
  perfCount: 0,
  item1: { level: '', inputMode: 'library', extra: '', propose: false, proposalText: '' },
  item1_1: { codes: '' },
  performances: []
};

function getInitialState() {
  return {
    schoolLevel: '',
    schoolName: '',
    subjectName: '',
    perfCount: 0,
    item1: { level: '', inputMode: 'library', extra: '', propose: false, proposalText: '' },
    item1_1: { codes: '' },
    performances: []
  };
}

function saveData() {
  state.schoolLevel = document.getElementById('schoolLevel').value;
  state.schoolName = document.getElementById('schoolName').value;
  state.subjectName = document.getElementById('subjectName').value;
  state.item1.extra = document.getElementById('item1-extra')?.value || '';
  state.item1.proposalText = document.getElementById('item1-proposal-text')?.value || '';
  state.item1_1.codes = document.getElementById('item1_1-codes')?.value || '';

  (state.performances || []).forEach((perf, i) => {
    perf.name = document.getElementById(`perf-${i}-name`)?.value || '';
    // 항목2
    perf.item2.extra = document.getElementById(`perf-${i}-item2-extra`)?.value || '';
    perf.item2.proposalText = document.getElementById(`perf-${i}-item2-proposal-text`)?.value || '';
    // 항목3
    perf.item3.selectedSubtypes = getCheckedSubtypes(i, '3');
    perf.item3.extra = document.getElementById(`perf-${i}-item3-extra`)?.value || '';
    perf.item3.proposalText = document.getElementById(`perf-${i}-item3-proposal-text`)?.value || '';
    // 항목8
    perf.item4.selectedSubtypes = getCheckedSubtypes(i, '4');
    perf.item4.extra = document.getElementById(`perf-${i}-item4-extra`)?.value || '';
    perf.item4.proposalText = document.getElementById(`perf-${i}-item4-proposal-text`)?.value || '';
    // 항목5
    perf.item5.selectedSubtypes = getCheckedSubtypes(i, '5');
    perf.item5.extra = document.getElementById(`perf-${i}-item5-extra`)?.value || '';
    perf.item5.proposalText = document.getElementById(`perf-${i}-item5-proposal-text`)?.value || '';
    // 기타 의견
    perf.etc = document.getElementById(`perf-${i}-etc`)?.value || '';
  });

  localStorage.setItem('consulting-state', JSON.stringify(state));
  updateProgress();
}

function getCheckedSubtypes(perfIdx, itemKey) {
  const checks = document.querySelectorAll(`input[name="perf-${perfIdx}-item${itemKey}-subtype"]:checked`);
  return Array.from(checks).map(c => c.value);
}

function collectBlanks(perfIdx, itemKey) {
  const blanks = {};
  const inputs = document.querySelectorAll(`[data-blank-perf="${perfIdx}"][data-blank-item="${itemKey}"]`);
  inputs.forEach(inp => { blanks[inp.dataset.blankKey] = inp.value; });
  return blanks;
}

function loadSavedData() {
  const saved = localStorage.getItem('consulting-state');
  if (!saved) return;
  try {
    const s = JSON.parse(saved);
    Object.assign(state, s);
    // 기본 정보 복원
    document.getElementById('schoolLevel').value = state.schoolLevel || '';
    document.getElementById('schoolName').value = state.schoolName || '';
    document.getElementById('subjectName').value = state.subjectName || '';
    // 학교급 → STEP 2 표시
    if (state.schoolLevel) {
      onSchoolLevelChange(true);
    }
    // 수행평가 개수 → STEP 3 표시 + 패널 렌더
    if (state.perfCount) {
      document.getElementById('perfCount').value = state.perfCount;
      onPerfCountChange(true);
    }
    // 항목1 판정 복원
    if (state.item1.level) {
      const r1 = document.querySelector(`input[name="item1"][value="${state.item1.level}"]`);
      if (r1) { r1.checked = true; onItem1Change(state.item1.level); }
      // extra 복원
      const ta1 = document.getElementById('item1-extra');
      if (ta1 && state.item1.extra) ta1.value = state.item1.extra;
    }
    // 항목1-1 복원
    if (state.item1_1.codes) {
      const el = document.getElementById('item1_1-codes');
      if (el) { el.value = state.item1_1.codes; onItem1_1Change(); }
    }
    // 수행평가별 복원 (renderPerfPanels 내부 restorePerfValues에서 처리)
  } catch(e) { console.error('loadSavedData error:', e); }
}

// ───────────────────────────────────────────
// 학교급 변경
// ───────────────────────────────────────────
function onSchoolLevelChange(silent = false) {
  const level = document.getElementById('schoolLevel').value;
  state.schoolLevel = level;
  const container = document.getElementById('appContainer');
  if (level === 'high') {
    container.classList.add('high-school');
  } else {
    container.classList.remove('high-school');
  }
  if (level) {
    document.getElementById('subjectItemsCard').style.display = 'block';
    if (state.perfCount) document.getElementById('perfItemsCard').style.display = 'block';
    document.getElementById('outputCard').style.display = 'block';
  }
  if (!silent) saveData();
}

// ───────────────────────────────────────────
// 수행평가 개수 변경
// ───────────────────────────────────────────
function onPerfCountChange(silent = false) {
  const count = parseInt(document.getElementById('perfCount').value);
  if (!count) return;
  state.perfCount = count;

  // 기존 state 유지하면서 부족한 부분만 추가
  while (state.performances.length < count) {
    state.performances.push(createPerfState(state.performances.length));
  }
  state.performances = state.performances.slice(0, count);

  renderPerfTabs();
  renderPerfPanels();
  document.getElementById('perfItemsCard').style.display = 'block';
  document.getElementById('outputCard').style.display = 'block';

  if (!silent) saveData();
}

function createPerfState(idx) {
  return {
    name: '',
    item2: { level: '', inputMode: 'library', extra: '', propose: false, proposalText: '' },
    item3: { level: '', inputMode: 'library', selectedSubtypes: [], blanks: {}, extra: '', propose: false, proposalText: '' },
    item4: { level: '', selectedSubtypes: [], extra: '', propose: false, proposalText: '' },
    item5: { level: '', selectedSubtypes: [], extra: '', propose: false, proposalText: '' },
    etc: ''
  };
}

// ───────────────────────────────────────────
// 수행평가 탭 렌더
// ───────────────────────────────────────────
function renderPerfTabs() {
  const tabs = document.getElementById('perfTabs');
  tabs.innerHTML = '';
  for (let i = 0; i < state.perfCount; i++) {
    const btn = document.createElement('button');
    btn.className = 'perf-tab' + (i === 0 ? ' active' : '');
    btn.textContent = `수행평가 ${i + 1}`;
    btn.onclick = () => switchPerfTab(i);
    tabs.appendChild(btn);
  }
}

function switchPerfTab(idx) {
  document.querySelectorAll('.perf-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.perf-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
}

// ───────────────────────────────────────────
// 수행평가 패널 렌더
// ───────────────────────────────────────────
function renderPerfPanels() {
  const panels = document.getElementById('perfPanels');
  panels.innerHTML = '';
  for (let i = 0; i < state.perfCount; i++) {
    const panel = document.createElement('div');
    panel.className = 'perf-panel' + (i === 0 ? ' active' : '');
    panel.id = `perf-panel-${i}`;
    panel.innerHTML = renderPerfPanel(i);
    panels.appendChild(panel);
  }
  // 저장된 값 복원
  restorePerfValues();
}

function onItem1Change(level) {
  state.item1.level = level;
  const lib = LIBRARY?.items?.item1;
  let text = '';
  if (lib?.sentences?.[level]?.[0]) {
    text = lib.sentences[level][0].text;
  }
  const box = document.getElementById('item1-preview');
  box.textContent = text;
  box.className = 'preview-box show ' + (level === '적절' ? 'ok' : 'req');
  // 라이브러리 모드면 extra에 자동 저장
  if (state.item1.inputMode === 'library') {
    state.item1.extra = text;
    document.getElementById('item1-extra').value = text;
  }
  saveData();
}

function onItem1_1Change() {
  const codes = document.getElementById('item1_1-codes').value.trim();
  const lib = LIBRARY?.items?.item1_1;
  let text = '';
  if (codes) {
    text = (lib?.sentences?.['누락 있음']?.[0]?.text || '').replace('{{누락된 성취기준 코드}}', codes);
  } else {
    text = lib?.sentences?.['누락 없음']?.[0]?.text || '';
  }
  const box = document.getElementById('item1_1-preview');
  box.textContent = text;
  box.className = 'preview-box show ' + (codes ? 'req' : 'ok');
  saveData();
}

function onPerfItemChange(perfIdx, itemKey, level) {
  state.performances[perfIdx][itemKey].level = level;
  const previewId = `perf-${perfIdx}-${itemKey}-preview`;
  const box = document.getElementById(previewId);

  // 서브타입 패널 표시
  if (itemKey === 'item3') {
    const p = document.getElementById(`perf-${perfIdx}-item3-subtypes-req`);
    if (p) p.style.display = level === '수정 요청' ? 'block' : 'none';
    document.querySelectorAll(`input[name="perf-${perfIdx}-item3-subtype"]`).forEach(cb => cb.checked = false);
  }
  if (itemKey === 'item4') {
    const p = document.getElementById(`perf-${perfIdx}-item4-subtypes`);
    if (p) p.style.display = level === '수정 요청' ? 'block' : 'none';
  }
  if (itemKey === 'item5') {
    const p = document.getElementById(`perf-${perfIdx}-item5-subtypes`);
    if (p) p.style.display = level === '수정 요청' ? 'block' : 'none';
  }

  if (box) {
    if (level === '적절') {
      const lib = LIBRARY?.items?.[itemKey === 'item3' ? 'item3_4_7_6' : itemKey];
      const text = lib?.sentences?.['적절']?.[0]?.text || '';
      box.textContent = text;
      box.className = 'preview-box show ok';
    } else {
      box.textContent = '';
      box.className = 'preview-box';
    }
  }

  // item3·4·5는 preview-box 없이 textarea 방식 — 적절 선택 시 직접 삽입
  if (['item3','item4','item5'].includes(itemKey)) {
    const ta = document.getElementById(`perf-${perfIdx}-${itemKey}-extra`);
    if (ta) {
      if (level === '적절') {
        const libKey = itemKey === 'item3' ? 'item3_4_7_6' : itemKey;
        const okText = LIBRARY?.items?.[libKey]?.sentences?.['적절']?.[0]?.text || '';
        ta.value = okText;
      } else {
        ta.value = '';
      }
    }
  }

  // 판정 변경 시 라이브러리 첫 문장 자동 반영
  const perf = state.performances[perfIdx];
  if (itemKey !== 'item3') {
    const lib = LIBRARY?.items?.[itemKey];
    const levelData = lib?.sentences?.[level];
    const sent = Array.isArray(levelData) ? levelData[0] : null;
    if (sent) {
      let text = sent.text;
      if (sent.blanks) {
        sent.blanks.forEach(b => { text = text.replace(`{{${b}}}`, `[${b}]`); });
      }
      const perfName = perf.name || `수행평가 ${perfIdx + 1}`;
      text = text.replace(/{{수행평가명}}/g, perfName).replace(/\[수행평가명\]/g, perfName);
      perf[itemKey].extra = text;

      // 라이브러리 모드 → preview-box 업데이트
      const previewBox = document.getElementById(`perf-${perfIdx}-${itemKey}-preview`);
      if (previewBox) {
        previewBox.textContent = text;
        const cls = level === '적절' ? 'ok' : level === '수정 권고' ? 'warn' : 'req';
        previewBox.className = `preview-box show ${cls}`;
      }
      // 직접 입력 모드 → textarea 업데이트
      const taEl = document.getElementById(`perf-${perfIdx}-${itemKey}-extra`);
      if (taEl) taEl.value = text;
    } else {
      // 적절이 아닌데 문장이 없으면 초기화
      const previewBox = document.getElementById(`perf-${perfIdx}-${itemKey}-preview`);
      if (previewBox && level !== '적절') {
        previewBox.textContent = '';
        previewBox.className = 'preview-box';
      }
    }
  }

  saveData();
}

function on3SubtypeChange(perfIdx) {
  const checked = Array.from(document.querySelectorAll(`input[name="perf-${perfIdx}-item3-subtype"]:checked`)).map(c => c.value);
  const cardsDiv = document.getElementById(`perf-${perfIdx}-item3-sentence-cards`);
  const perfName = document.getElementById(`perf-${perfIdx}-name`)?.value || `수행평가 ${perfIdx + 1}`;

  // 선택된 유형의 카드 렌더
  cardsDiv.innerHTML = checked.map(key => {
    const sents = LIBRARY?.items?.item3?.sentences?.['수정 요청']?.[key];
    if (!sents || !sents[0]) return '';
    const text = sents[0].text.replace(/\[수행평가명\]/g, perfName);
    return `
      <div style="border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;background:#fafafa;">
        <div style="font-size:11px;font-weight:600;color:var(--req);margin-bottom:6px;">▸ ${type.label}</div>
        <div style="display:flex;flex-direction:column;gap:5px;">
          <div style="background:var(--ok-light);border:1px solid var(--ok);border-radius:4px;padding:7px 10px;font-size:11px;line-height:1.7;color:#333;cursor:pointer;"
               onclick="appendItem3Text(${perfIdx}, \`${text.replace(/`/g,"'")}\`)">
            <span style="font-size:10px;font-weight:600;color:var(--ok);">📚 라이브러리 — 클릭하면 그대로 삽입</span><br>${text}
          </div>
          <div style="background:var(--warn-light);border:1px solid #e0a800;border-radius:4px;padding:7px 10px;font-size:11px;line-height:1.7;color:#333;cursor:pointer;"
               onclick="appendItem3Text(${perfIdx}, \`${text.replace(/`/g,"'")}\`)">
            <span style="font-size:10px;font-weight:600;color:var(--warn);">✏️ 직접 입력 — 클릭 후 textarea에서 수정</span><br>${text}
          </div>
        </div>
      </div>`;
  }).join('');

  saveData();

function appendItem3Text(perfIdx, text) {
  const ta = document.getElementById(`perf-${perfIdx}-item3-extra`);

function renderSubtypePreview(perfIdx, itemKey, libKey) {
  const checked = Array.from(document.querySelectorAll(`input[name="perf-${perfIdx}-${itemKey}-subtype"]:checked`)).map(c => c.value);
  const lib = LIBRARY?.items?.[itemKey];
  const blanksDiv = document.getElementById(`perf-${perfIdx}-${itemKey}-blanks`);
  const previewBox = document.getElementById(`perf-${perfIdx}-${itemKey}-preview`);
  let texts = [];
  let allBlanks = [];
  let hasEmphasis = false;

  checked.forEach(subtype => {
    const sentences = lib?.sentences?.['수정 요청']?.[subtype] || [];
    sentences.forEach(s => {
      texts.push({ text: s.text, emphasis: s.emphasis || false });
      if (s.emphasis) hasEmphasis = true;
      if (s.blanks) allBlanks.push(...s.blanks.map(b => ({key: b, subtype})));
    });
  });

  // 항목 4 emphasis 유형은 빨간 테두리 강조
  if (itemKey === 'item4' && hasEmphasis) {
    previewBox.className = texts.length ? 'preview-box show req' : 'preview-box';
    previewBox.style.borderLeftWidth = '4px';
    previewBox.style.borderLeftColor = '#a32d2d';
    previewBox.style.background = '#fdecea';
  } else {
    previewBox.className = texts.length ? 'preview-box show req' : 'preview-box';
    previewBox.style.borderLeftWidth = '';
    previewBox.style.borderLeftColor = '';
    previewBox.style.background = '';
  }

  // 줄바꿈(\n) 처리하여 표시
  previewBox.innerHTML = texts.map(t => {
    const parts = t.text.split('\n');
    if (parts.length > 1 && t.emphasis) {
      return `<span>${parts[0]}</span><br><br><span style="color:#a32d2d;font-weight:600;">${parts[1]}</span>`;
    }
    return `<span>${t.text}</span>`;
  }).join('<br><br>');

  blanksDiv.innerHTML = allBlanks.map(b => `
    <div class="blank-group">
      <label>✎ ${b.key} 입력</label>
      <input type="text" placeholder="${b.key}을(를) 입력하세요"
        data-blank-perf="${perfIdx}" data-blank-item="${libKey}" data-blank-key="${b.subtype}_${b.key}"
        oninput="updateSubtypePreview(${perfIdx},'${itemKey}')">
    </div>
  `).join('');
  saveData();
}

function updateSubtypePreview(perfIdx, itemKey) {
  const checked = Array.from(document.querySelectorAll(`input[name="perf-${perfIdx}-${itemKey}-subtype"]:checked`)).map(c => c.value);
  const lib = LIBRARY?.items?.[itemKey];
  const previewBox = document.getElementById(`perf-${perfIdx}-${itemKey}-preview`);
  const libKey = itemKey === 'item4' ? '4' : '5';
  let texts = [];
  checked.forEach(subtype => {
    const sentences = lib?.sentences?.['수정 요청']?.[subtype] || [];
    sentences.forEach(s => {
      let text = s.text;
      if (s.blanks) {
        s.blanks.forEach(b => {
          const inp = document.querySelector(`[data-blank-perf="${perfIdx}"][data-blank-item="${libKey}"][data-blank-key="${subtype}_${b}"]`);
          if (inp) text = text.replace(`{{${b}}}`, inp.value || `[${b}]`);
        });
      }
      texts.push(text);
    });
  });
  previewBox.textContent = texts.join('\n\n');
  saveData();
}

function j은는(word) {
  if (!word) return '은';
  const code = word.charCodeAt(word.length - 1) - 0xAC00;
  return (code >= 0 && code % 28 !== 0) ? '은' : '는';
}
function j이가(word) {
  if (!word) return '이';
  const code = word.charCodeAt(word.length - 1) - 0xAC00;
  return (code >= 0 && code % 28 !== 0) ? '이' : '가';
}

function collectProposals() {
  const proposals = [];
  const check = (id, textId, label) => {
    const cb = document.getElementById(id);
    const txt = document.getElementById(textId);
    if (cb?.checked && txt?.value.trim()) {
      proposals.push({item: label, text: txt.value.trim()});
    }
  };
  check('item1-propose', 'item1-proposal-text', '항목 1');
  (state.performances || []).forEach((_, i) => {
    check(`perf-${i}-item2-propose`, `perf-${i}-item2-proposal-text`, `항목 2 (수행평가 ${i+1})`);
    check(`perf-${i}-item3-propose`, `perf-${i}-item3-proposal-text`, `항목 3 정합성 (수행평가 ${i+1})`);
    check(`perf-${i}-item4-propose`, `perf-${i}-item4-proposal-text`, `항목 4 (수행평가 ${i+1})`);
    check(`perf-${i}-item5-propose`, `perf-${i}-item5-proposal-text`, `항목 5 (수행평가 ${i+1})`);
  });
  return proposals;
}

async function submitProposals() {
  const proposals = collectProposals();
  if (proposals.length === 0) { alert('제안된 내용이 없습니다.'); return; }

  const user = document.getElementById('proposalGithubUser').value.trim();
  const repo = document.getElementById('proposalGithubRepo').value.trim();
  const token = document.getElementById('proposalGithubToken').value.trim();
  const statusDiv = document.getElementById('proposalStatus');

  if (!user || !repo || !token) {
    statusDiv.style.display = 'block';
    statusDiv.style.background = '#fdecea';
    statusDiv.style.color = '#a32d2d';
    statusDiv.textContent = 'GitHub 사용자명, Repository, Token을 모두 입력해 주세요.';
    return;
  }

  const school = state.schoolName || '○○학교';
  const subject = state.subjectName || '해당 과목';
  const date = state.reviewDate || new Date().toISOString().split('T')[0];

  let successCount = 0;
  let failCount = 0;

  statusDiv.style.display = 'block';
  statusDiv.style.background = '#e8f0f8';
  statusDiv.style.color = '#1a3d6b';
  statusDiv.textContent = `${proposals.length}개 제안을 전송 중입니다...`;

  for (const proposal of proposals) {
    const title = `[라이브러리 제안] ${proposal.item} — ${school} ${subject}`;
    const body = `## 라이브러리 추가 제안\n\n**항목**: ${proposal.item}\n**학교**: ${school}\n**과목**: ${subject}\n**검토일**: ${date}\n\n### 제안 문장\n\n${proposal.text}\n\n---\n*이 이슈는 평가계획서 서면 컨설팅 시스템에서 자동 생성되었습니다.*`;

    try {
      const res = await fetch(`https://api.github.com/repos/${user}/${repo}/issues`, {
        method: 'POST',
        headers: {
          'Authorization': `token ${token}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ title, body, labels: ['라이브러리 제안'] })
      });
      if (res.ok) successCount++;
      else failCount++;
    } catch(e) {
      failCount++;
    }
  }

  if (successCount > 0 && failCount === 0) {
    statusDiv.style.background = '#e8f5e9';
    statusDiv.style.color = '#1d6a3a';
    statusDiv.textContent = `✅ ${successCount}개 제안이 관리자에게 전송되었습니다.`;
    // 제안 체크박스 초기화
    document.querySelectorAll('input[id$="-propose"]').forEach(cb => {
      cb.checked = false;
      toggleProposal(cb.id.replace('-propose', ''));
    });
  } else if (failCount > 0) {
    statusDiv.style.background = '#fdecea';
    statusDiv.style.color = '#a32d2d';
    statusDiv.textContent = `성공 ${successCount}개 / 실패 ${failCount}개. Token 또는 Repository 이름을 확인해 주세요.`;
  }
}

function saveBackup() {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${state.schoolName || '학교'}-${state.subjectName || '과목'}.json`;
  a.click();
}

function loadBackup() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        state = getInitialState();
        Object.assign(state, data);

        // 기본 정보
        document.getElementById('schoolLevel').value = state.schoolLevel || '';
        document.getElementById('schoolName').value  = state.schoolName  || '';
        document.getElementById('subjectName').value = state.subjectName || '';

        // STEP 2·3 표시
        if (state.schoolLevel) onSchoolLevelChange(true);
        if (state.perfCount) {
          document.getElementById('perfCount').value = state.perfCount;
          onPerfCountChange(true);
        }

        // 항목1
        const r1 = document.querySelector(`input[name="item1"][value="${state.item1?.level || ''}"]`);
        if (r1) r1.checked = true;
        const ta1 = document.getElementById('item1-extra');
        if (ta1) ta1.value = state.item1?.extra || '';

        // 항목1-1 (고교)
        if (state.schoolLevel === 'high' && state.item1_1?.codes) {
          const el = document.getElementById('item1_1-codes');
          if (el) { el.value = state.item1_1.codes; onItem1_1Change(); }
        }

        // 수행평가별 복원 (렌더 완료 후)
        setTimeout(() => {
          (state.performances || []).forEach((perf, i) => {
            const nameEl = document.getElementById(`perf-${i}-name`);
            if (nameEl) nameEl.value = perf.name || '';

            ['item2','item3','item4','item5'].forEach(key => {
              const item = perf[key];
              if (!item?.level) return;
              // 라디오
              const radio = document.querySelector(`input[name="perf-${i}-${key}"][value="${item.level}"]`);
              if (radio) radio.checked = true;
              // 서브타입 패널 표시
              if (item.level === '수정 요청') {
                const p1 = document.getElementById(`perf-${i}-${key}-subtypes`);
                const p2 = document.getElementById(`perf-${i}-${key}-subtypes-req`);
                if (p1) p1.style.display = 'block';
                if (p2) p2.style.display = 'block';
              }
              // extra textarea
              const ta = document.getElementById(`perf-${i}-${key}-extra`);
              if (ta) ta.value = item.extra || '';
            });

            const etcEl = document.getElementById(`perf-${i}-etc`);
            if (etcEl) etcEl.value = perf.etc || '';
          });
          updateProgress();
        }, 200);

        localStorage.setItem('consulting-state', JSON.stringify(state));
        alert('데이터를 불러왔습니다.');

      } catch (err) {
        alert('파일을 불러오지 못했습니다.\n오류: ' + err.message);
      }
    };
    reader.readAsText(file, 'UTF-8');
  };
  input.click();
}

function newSubject() {
  if (!confirm('정말로 새 과목을 시작하시겠습니까?\n현재 입력한 데이터는 모두 삭제됩니다.')) return;
  // 상태 초기화
  state = getInitialState();
  localStorage.removeItem('consulting-state');
  // UI 초기화
  document.querySelectorAll('input, select, textarea').forEach(el => {
    if (el.type === 'radio') el.checked = false;
    else if (el.type === 'checkbox') el.checked = false;
    else el.value = '';
  });
  document.getElementById('perfTabs').innerHTML = '';
  document.getElementById('perfPanels').innerHTML = '';
  document.getElementById('subjectItemsCard').style.display = 'none';
  document.getElementById('perfItemsCard').style.display = 'none';
  document.getElementById('outputCard').style.display = 'none';
  document.getElementById('proposalCard').style.display = 'none';
  onSchoolLevelChange();
  updateProgress();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

  const school = state.schoolName || '○○학교';
  const subject = state.subjectName || '해당 과목';

  // ── XML 특수문자 이스케이프
  const esc = (s) => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  // ── 색상 (OOXML용 RGB, # 없음)
  const C = { navy:'1A3D6B', navyLight:'E8F0F8', ok:'1D6A3A', okLight:'E8F5E9', warn:'7D4A00', warnLight:'FFF3E0', req:'A32D2D', reqLight:'FDECEA', gray:'888888', black:'222222', border:'CCCCCC', white:'FFFFFF', coreYellow:'FFFDE7' };

  const levelColor = (lv) => lv==='적절' ? C.ok : lv==='수정 권고' ? C.warn : lv==='수정 요청' ? C.req : C.gray;
  const levelBg    = (lv) => lv==='적절' ? C.okLight : lv==='수정 권고' ? C.warnLight : lv==='수정 요청' ? C.reqLight : 'F5F5F5';

  // ── 단락 빌더
  // opts: { bold, color, size, align, indent, spaceBefore, spaceAfter, bgColor }
  const makePara = (text, opts={}) => {
    const sz   = (opts.size || 19);
    const bold = opts.bold ? '<w:b/>' : '';
    const clr  = opts.color ? `<w:color w:val="${opts.color}"/>` : '';
    const jc   = opts.align ? `<w:jc w:val="${opts.align}"/>` : '';
    const ind  = opts.indent ? `<w:ind w:left="${opts.indent}"/>` : '';
    const spc  = `<w:spacing w:before="${opts.spaceBefore||40}" w:after="${opts.spaceAfter||40}"/>`;
    const bg   = opts.bgColor ? `<w:shd w:val="clear" w:color="auto" w:fill="${opts.bgColor}"/>` : '';
    // 줄바꿈 처리
    const lines = esc(text).split('&#10;').join('</w:t><w:br/><w:t xml:space="preserve">');
    return `<w:p><w:pPr>${spc}${jc}${ind}${bg}</w:pPr><w:r><w:rPr>${bold}${clr}<w:sz w:val="${sz}"/><w:szCs w:val="${sz}"/><w:rFonts w:ascii="맑은 고딕" w:hAnsi="맑은 고딕" w:cs="맑은 고딕"/></w:rPr><w:t xml:space="preserve">${esc(text)}</w:t></w:r></w:p>`;
  };

  const emptyPara = () => `<w:p><w:pPr><w:spacing w:before="60" w:after="60"/></w:pPr></w:p>`;

  // ── 표 셀 빌더
  const makeCell = (text, opts={}) => {
    const sz    = opts.size || 17;
    const bold  = opts.bold ? '<w:b/>' : '';
    const clr   = opts.color ? `<w:color w:val="${opts.color}"/>` : '';
    const fill  = opts.fill || 'FFFFFF';
    const jc    = opts.align ? `<w:jc w:val="${opts.align}"/>` : '';
    const wVal  = opts.width ? `<w:tcW w:w="${opts.width}" w:type="dxa"/>` : '';
    const lines = text.split('\n');

</Properties>`;

  const contentTypesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>
  <Override PartName="/docProps/app.xml" ContentType="application/vnd.openxmlformats-officedocument.extended-properties+xml"/>
</Types>`;

  const packageRelsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
  <Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/extended-properties" Target="docProps/app.xml"/>
</Relationships>`;

  // ── JSZip으로 .docx 패키지 생성
  const zip = new JSZip();
  zip.file('[Content_Types].xml', contentTypesXml);
  zip.file('_rels/.rels', packageRelsXml);
  zip.file('word/document.xml', documentXml);
  zip.file('word/styles.xml', stylesXml);
  zip.file('word/_rels/document.xml.rels', relsXml);
  zip.file('docProps/app.xml', appXml);

  const blob = await zip.generateAsync({ type:'blob', mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${school}-${subject}.docx`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 10000);
}

function restorePerfValues() {
  (state.performances || []).forEach((perf, i) => {
    if (perf.item2.level) {
      const radio = document.querySelector(`input[name="perf-${i}-item2"][value="${perf.item2.level}"]`);
      if (radio) { radio.checked = true; onPerfItemChange(i, 'item2', perf.item2.level); }
    }
    if (perf.item3.level) {
      const radio = document.querySelector(`input[name="perf-${i}-item3"][value="${perf.item3.level}"]`);
      if (radio) {
        radio.checked = true;
        onPerfItemChange(i, 'item3', perf.item3.level);
        // 저장된 서브타입 체크박스 복원
        (perf.item3.selectedSubtypes || []).forEach(key => {
          const cb = document.querySelector(`input[name="perf-${i}-item3-subtype"][value="${key}"]`);
          if (cb) cb.checked = true;
        });
        on3SubtypeChange(i);
        // textarea 복원
        const ta3 = document.getElementById(`perf-${i}-item3-extra`);
        if (ta3 && perf.item3.extra) ta3.value = perf.item3.extra;
      }
    }
    if (perf.item4.level) {
      const radio = document.querySelector(`input[name="perf-${i}-item4"][value="${perf.item4.level}"]`);
      if (radio) {
        radio.checked = true;
        onPerfItemChange(i, 'item4', perf.item4.level);
        (perf.item4.selectedSubtypes || []).forEach(key => {
          const cb = document.querySelector(`input[name="perf-${i}-item4-subtype"][value="${key}"]`);
          if (cb) cb.checked = true;
        });
        on4SubtypeChange(i);
        const ta4 = document.getElementById(`perf-${i}-item4-extra`);
        if (ta4 && perf.item4.extra) ta4.value = perf.item4.extra;
      }
    }
    if (perf.item5.level) {
      const radio = document.querySelector(`input[name="perf-${i}-item5"][value="${perf.item5.level}"]`);
      if (radio) {
        radio.checked = true;
        onPerfItemChange(i, 'item5', perf.item5.level);
        (perf.item5.selectedSubtypes || []).forEach(key => {
          const cb = document.querySelector(`input[name="perf-${i}-item5-subtype"][value="${key}"]`);
          if (cb) cb.checked = true;
        });
        on5SubtypeChange(i);
        const ta5 = document.getElementById(`perf-${i}-item5-extra`);
        if (ta5 && perf.item5.extra) ta5.value = perf.item5.extra;
      }
    }
    // inputMode 복원
    ['item2','item3','item4','item5'].forEach(key => {
      const mode = perf[key].inputMode || 'library';
      const modeRadio = document.querySelector(`input[name="perf-${i}-${key}-inputMode"][value="${mode}"]`);
      if (modeRadio) { modeRadio.checked = true; onInputModeChange(i, key === 'item3' ? '3' : key.replace('item',''), mode); }
    });
  });
  // item1 inputMode 복원
  if (state.item1.inputMode) {
    const m = document.querySelector(`input[name="item1-inputMode"][value="${state.item1.inputMode}"]`);
    if (m) { m.checked = true; onInputModeChange(-1, '1', state.item1.inputMode); }
  }
}

<script>
// ───────────────────────────────────────────
// 문장 선택 모달
// ───────────────────────────────────────────
let _modalPerfIdx = null;
let _modalItemKey = null;

function openSentenceModal(perfIdx, itemKey) {
  _modalPerfIdx = perfIdx;
  _modalItemKey = itemKey;

  // itemKey 정규화: '2' → 'item2', '3' → 'item3' 등
  const stateKey = /^\d/.test(itemKey) ? `item${itemKey}` : itemKey;
  // 라이브러리 키: item3 → item3, 나머지 그대로
  const libKey = stateKey;

  let level, lib, sentences = [];

  if (perfIdx === -1) {
    level = state[stateKey]?.level || '';
    lib = LIBRARY?.items?.[libKey];
  } else {
    const perf = state.performances ? state.performances[perfIdx] : null;
    level = perf ? perf[stateKey]?.level || '' : '';
    lib = LIBRARY?.items?.[libKey];
  }

  if (!lib?.sentences) {
    // 문장 없음
  } else if (itemKey === '1_1') {
    Object.keys(lib.sentences).forEach(lv => {
      (lib.sentences[lv] || []).forEach(s => {
        sentences.push({ text: s.text, blanks: s.blanks || [] });
      });
    });
  } else if (lib.sentences[level]) {
    const levelData = lib.sentences[level];
    if (Array.isArray(levelData)) {
      // 배열 구조 (item1, item2) — 수행평가명 치환
      const perfName = perfIdx >= 0
        ? (state.performances?.[perfIdx]?.name || `수행평가 ${perfIdx + 1}`)
        : '';
      levelData.forEach(s => {
        let text = s.text;
        if (s.blanks) s.blanks.forEach(b => { text = text.replace(`{{${b}}}`, `[${b}]`); });
        if (perfName) text = text.replace(/{{수행평가명}}/g, perfName).replace(/\[수행평가명\]/g, perfName);
        sentences.push({ text, blanks: [] });
      });
    } else if (typeof levelData === 'object') {
      // 객체 구조 (item3, item4, item5 수정 요청 유형별)
      Object.keys(levelData).forEach(subtype => {
        (levelData[subtype] || []).forEach(s => {
          sentences.push({ text: s.text, blanks: s.blanks || [] });
        });
      });
    }
  }

  const body = document.getElementById('modalBody');
  if (sentences.length === 0) {
    body.innerHTML = '<div class="modal-empty">선택 가능한 문장이 없습니다.</div>';
  } else {
    body.innerHTML = sentences.map((s) => {
      let displayText = s.text;
      if (s.blanks && s.blanks.length > 0) {
        s.blanks.forEach(b => { displayText = displayText.replace(`{{${b}}}`, `[${b}]`); });
      }
      return `<div class="library-sentence" onclick="selectSentence('${displayText.replace(/'/g, "\'")}', ${perfIdx}, '${itemKey}')">${displayText}</div>`;
    }).join('');
  }

  document.getElementById('sentenceModal').classList.add('show');
}
function closeSentenceModal() {
  document.getElementById('sentenceModal').classList.remove('show');
  _modalPerfIdx = null;
  _modalItemKey = null;
}

// 모달 외부 클릭으로 닫기
document.addEventListener('click', (e) => {
  const modal = document.getElementById('sentenceModal');
  if (e.target === modal) closeSentenceModal();
});

function selectSentence(displayText, perfIdx, itemKey) {
  const textareaId = perfIdx === -1 ? `item${itemKey}-extra` : `perf-${perfIdx}-item${itemKey}-extra`;
  const ta = document.getElementById(textareaId);
  if (ta) {
    const current = ta.value.trim();
    ta.value = current ? current + '\n' + displayText : displayText;
    ta.dispatchEvent(new Event('input', { bubbles: true }));
  }
  closeSentenceModal();
}

function onInputModeChange(perfIdx, itemKey, mode) {
  let itemState;
  if (perfIdx === -1) {
    itemState = state[`item${itemKey}`];
  } else {
    const perf = state.performances ? state.performances[perfIdx] : null;
    itemState = perf ? perf[`item${itemKey}`] : null;
  }
  if (!itemState) return;
  itemState.inputMode = mode;

  const stateKey = perfIdx === -1 ? `item${itemKey}` : `item${itemKey}`;
  const prefix = perfIdx === -1 ? '' : `perf-${perfIdx}-`;
  const libSection = document.getElementById(`${prefix}${stateKey}-library-section`);
  const dirSection = document.getElementById(`${prefix}${stateKey}-direct-section`);

  if (libSection) libSection.style.display = mode === 'library' ? '' : 'none';
  if (dirSection) dirSection.style.display = mode === 'direct' ? '' : 'none';
  saveData();
}
</script>

<!-- 문장 선택 모달 -->
<div class="modal-overlay" id="sentenceModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">📚 라이브러리 문장 선택</h3>
      <button class="modal-close" onclick="closeSentenceModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

</body>
</html>
